name: notify-rail

services:
  mysql:
    image: mysql:8.4
    container_name: notify-rail-mysql
    environment:
      MYSQL_DATABASE: notify_rail
      MYSQL_USER: notify
      MYSQL_PASSWORD: notify
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "13306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  rabbitmq:
    image: rabbitmq:4-management
    container_name: notify-rail-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: notify
      RABBITMQ_DEFAULT_PASS: notify
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq